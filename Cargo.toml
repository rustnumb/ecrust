[workspace]
members = [
    "fp",
    "ec",
    "isogeny",
    "protocol",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"

[workspace.dependencies]
# External
crypto-bigint = "0.7.1"

# Internal
fp       = { path = "fp",       version = "0.1.0" }
ec       = { path = "ec",       version = "0.1.0" }
protocol = { path = "protocol", version = "0.1.0" }
